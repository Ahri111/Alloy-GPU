# NiPt PT-MCMC config (auto-generated by convert_nipt.py)
mode: pt_mcmc

dataset_name: nipt
species_map:
  28: 0   # Ni
  78: 1   # Pt
n_atoms:  108
has_spin: false

pt_mcmc:
  model_ckpt:     ./best_nipt_ising_lite.pkl
  model_type:     ising_lite
  cif_template:   ./data/raw/nipt/Ni54Pt54_run_01.cif
  n_replicas:     3000
  n_steps:        100000
  t_min:          200.0
  t_max:          2000.0
  chunk_size:     200
  swap_interval:  10
  burnin_frac:    0.2
  seed:           42
  output:         ./pt_nipt_result.npz

  matmul_precision: float32
  enable_x64:      false

  sublattices:
    - name: FCC
      species: [0, 1]

  composition:
    FCC:
      0: 54    # Ni
      1: 54    # Pt

  spin_flip: false
  spin_species: []
