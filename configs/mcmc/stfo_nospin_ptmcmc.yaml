# ═══════════════════════════════════════════════════════════════════════
# STFO PT-MCMC (no spin)
# ═══════════════════════════════════════════════════════════════════════
mode: pt_mcmc

dataset_name: stfo_nospin
cif_dir:      ./data/raw/stfo
csv_path:     ./data/raw/stfo/detailed_info.csv
spin_pkl:     null
id_col:       id
comp_regex:   '_(\d+)'

species_map:
  22: 0   # Ti
  26: 1   # Fe
  8:  2   # O
  0: 3   # Vo (Xe)
n_atoms:  160
has_spin: false

pt_mcmc:
  cif_path:       ./data/raw/stfo/387.cif
  atom_init_path: ./data/raw/stfo/atom_init.json
  model_ckpt:     ./best_pkl/ising_heavy/best_model.pkl

  batch_size:     3000
  n_steps:        100000
  t_min:          200.0
  t_max:          1500.0
  chunk_size:     200
  swap_interval:  10

  burnin_chunks:  200
  save_every:     10
  output:         pt_result_nospin.npz

  matmul_precision: float32
  enable_x64:      false
